name: ATOM vLLM OOT Full Validation

on:
  schedule:
    # Nightly at 02:00 Beijing time (18:00 UTC on the previous day)
    - cron: '0 18 * * *'
  workflow_dispatch:
    # Manual runs use GitHub Actions' built-in branch dropdown ("Use workflow
    # from") as the ATOM branch selector, so users do not need to type branch
    # names.
    inputs:
      run_qwen3_moe_tp8:
        description: "Qwen3-235B-A22B-Instruct-2507-FP8 TP8+EP8"
        required: false
        type: boolean
        default: false
      run_qwen3_next_80b_tp2:
        description: "Qwen3-Next-80B-A3B-Instruct-FP8 TP2"
        required: false
        type: boolean
        default: false
      run_qwen35_397b_tp8:
        description: "Qwen3.5-397B-A17B-FP8 TP8"
        required: false
        type: boolean
        default: false
      run_kimi_k2_tp8:
        description: "Kimi-K2-Thinking-MXFP4 TP8"
        required: false
        type: boolean
        default: false
      run_dsr1_fp8_tp8:
        description: "DeepSeek-R1-FP8 TP8"
        required: false
        type: boolean
        default: false
      run_dsr1_fp4_tp8:
        description: "DeepSeek-R1-0528-MXFP4 TP8"
        required: false
        type: boolean
        default: false
      run_gpt_oss_120b_tp1:
        description: "gpt-oss-120b TP1"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NIGHTLY_OOT_IMAGE_TAG: rocm/atom-dev:vllm-latest
  VALIDATION_IMAGE_REPO: rocm/atom-dev
  MANUAL_BASE_IMAGE: rocm/pytorch:latest
  GPU_ARCH: "gfx942;gfx950"
  AITER_REPO: "https://github.com/ROCm/aiter.git"
  AITER_COMMIT: "HEAD"
  RCCL_REPO: "https://github.com/ROCm/rccl.git"
  RCCL_BRANCH: "29e1567b95e28823b0beb1a988adc587bfab5b4f"
  VLLM_COMMIT: "b31e9326a7d9394aab8c767f8ebe225c65594b60"

jobs:
  prepare-oot-image:
    name: Prepare OOT validation image
    runs-on: build-only-atom
    outputs:
      oot_image_tag: ${{ steps.meta.outputs.oot_image_tag }}
      cleanup_temp_image: ${{ steps.meta.outputs.cleanup_temp_image }}
      model_matrix: ${{ steps.meta.outputs.model_matrix }}
    steps:
      - name: Checkout selected ATOM branch
        uses: actions/checkout@v6

      - name: Docker Login
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name != 'main' }}
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Resolve image source and model matrix
        id: meta
        env:
          RUN_QWEN3_MOE_TP8: ${{ inputs.run_qwen3_moe_tp8 }}
          RUN_QWEN3_NEXT_80B_TP2: ${{ inputs.run_qwen3_next_80b_tp2 }}
          RUN_QWEN35_397B_TP8: ${{ inputs.run_qwen35_397b_tp8 }}
          RUN_KIMI_K2_TP8: ${{ inputs.run_kimi_k2_tp8 }}
          RUN_DSR1_FP8_TP8: ${{ inputs.run_dsr1_fp8_tp8 }}
          RUN_DSR1_FP4_TP8: ${{ inputs.run_dsr1_fp4_tp8 }}
          RUN_GPT_OSS_120B_TP1: ${{ inputs.run_gpt_oss_120b_tp1 }}
        run: |
          set -euo pipefail

          # Keep this Python model list as the single source of truth for OOT
          # full-validation coverage and manual checkbox filtering.
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import sys

          event = os.environ["GITHUB_EVENT_NAME"]
          models = [
              {
                  "toggle_env": "RUN_QWEN3_MOE_TP8",
                  "model_name": "Qwen3-235B-A22B-Instruct-2507-FP8 TP8+EP8",
                  "model_path": "Qwen/Qwen3-235B-A22B-Instruct-2507-FP8",
                  "extra_args": "--tensor-parallel-size 8 --enable-expert-parallel",
                  "accuracy_test_threshold": 0.87,
                  "env_vars": "ATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=1",
                  "runner": "linux-atom-mi350-8",
              },
              {
                  "toggle_env": "RUN_QWEN3_NEXT_80B_TP2",
                  "model_name": "Qwen3-Next-80B-A3B-Instruct-FP8 TP2",
                  "model_path": "Qwen/Qwen3-Next-80B-A3B-Instruct-FP8",
                  "extra_args": "--tensor-parallel-size 2",
                  "accuracy_test_threshold": 0.83,
                  "env_vars": "ATOM_DISABLE_VLLM_PLUGIN_ATTENTION=1",
                  "runner": "linux-atom-mi350-4",
              },
              {
                  "toggle_env": "RUN_QWEN35_397B_TP8",
                  "model_name": "Qwen3.5-397B-A17B-FP8 TP8",
                  "model_path": "Qwen/Qwen3.5-397B-A17B-FP8",
                  "extra_args": "--tensor-parallel-size 8",
                  "accuracy_test_threshold": 0.83,
                  "env_vars": "ATOM_DISABLE_VLLM_PLUGIN_ATTENTION=1",
                  "runner": "linux-atom-mi350-8",
              },
              {
                  "toggle_env": "RUN_KIMI_K2_TP8",
                  "model_name": "Kimi-K2-Thinking-MXFP4 TP8",
                  "model_path": "amd/Kimi-K2-Thinking-MXFP4",
                  "extra_args": "--tensor-parallel-size 8",
                  "accuracy_test_threshold": 0.90,
                  "env_vars": "",
                  "runner": "linux-atom-mi350-8",
              },
              {
                  "toggle_env": "RUN_DSR1_FP8_TP8",
                  "model_name": "DeepSeek-R1-FP8 TP8",
                  "model_path": "deepseek-ai/DeepSeek-R1-0528",
                  "extra_args": "--tensor-parallel-size 8",
                  "accuracy_test_threshold": 0.93,
                  "env_vars": "",
                  "runner": "linux-atom-mi350-8",
              },
              {
                  "toggle_env": "RUN_DSR1_FP4_TP8",
                  "model_name": "DeepSeek-R1-0528-MXFP4 TP8",
                  "model_path": "amd/DeepSeek-R1-0528-MXFP4",
                  "extra_args": "--tensor-parallel-size 8",
                  "accuracy_test_threshold": 0.93,
                  "env_vars": "",
                  "runner": "linux-atom-mi350-8",
              },
              {
                  "toggle_env": "RUN_GPT_OSS_120B_TP1",
                  "model_name": "gpt-oss-120b TP1",
                  "model_path": "openai/gpt-oss-120b",
                  "extra_args": "--tensor-parallel-size 1",
                  "accuracy_test_threshold": 0.33,
                  "env_vars": "ATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=1",
                  "runner": "linux-atom-mi350-1",
              },
          ]

          selected = []
          for model in models:
              enabled = event != "workflow_dispatch" or os.environ.get(model["toggle_env"], "").lower() == "true"
              if enabled:
                  selected.append({k: v for k, v in model.items() if k != "toggle_env"})

          if event == "workflow_dispatch" and not selected:
              print("No models selected for manual run.", file=sys.stderr)
              sys.exit(1)

          print(f"model_matrix={json.dumps({'include': selected})}")
          PY

          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ] || [ "${GITHUB_REF_NAME}" = "main" ]; then
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              echo "Manual run on main reuses published OOT image: ${NIGHTLY_OOT_IMAGE_TAG}"
            else
              echo "Scheduled run uses published OOT image: ${NIGHTLY_OOT_IMAGE_TAG}"
            fi
            echo "oot_image_tag=${NIGHTLY_OOT_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
            echo "cleanup_temp_image=false" >> "$GITHUB_OUTPUT"
            echo "manual_base_image_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          MANUAL_BASE_IMAGE_TAG="atom_oot_manual_base:${GITHUB_RUN_ID}-${SHORT_SHA}"
          OOT_IMAGE_TAG="${VALIDATION_IMAGE_REPO}:oot-full-manual-${GITHUB_RUN_ID}-${SHORT_SHA}"
          BUILD_CONTEXT="$(mktemp -d)"
          trap 'rm -rf "${BUILD_CONTEXT}"' EXIT

          git archive --format=tar HEAD | tar -xf - -C "${BUILD_CONTEXT}"

          BUILD_CONTEXT="${BUILD_CONTEXT}" python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          build_context = Path(os.environ["BUILD_CONTEXT"])
          dockerfile_path = build_context / "docker" / "Dockerfile"
          manual_dockerfile_path = build_context / "docker" / "Dockerfile.manual"

          text = dockerfile_path.read_text(encoding="utf-8")
          pattern = re.compile(
              r"# ATOM:.*?ARG CACHEBUST=.*?RUN pip show atom \|\| true\n",
              re.S,
          )
          replacement = "\n".join([
              "# ATOM: install the selected branch from the workflow checkout archive",
              "# CACHEBUST invalidates only this layer so parallel stages stay cached",
              "ARG CACHEBUST=1",
              "RUN rm -rf /app/ATOM",
              "COPY . /app/ATOM",
              "RUN cd /app/ATOM && pip install -e .",
              "RUN pip show atom || true",
              "",
          ])

          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit("Unable to rewrite the ATOM install block in docker/Dockerfile")

          manual_dockerfile_path.write_text(text, encoding="utf-8")
          PY

          echo "Building manual OOT image from branch ${GITHUB_REF_NAME}"

          DOCKER_BUILDKIT=1 docker build --pull --network=host \
            -t "${MANUAL_BASE_IMAGE_TAG}" \
            --target atom_image \
            --build-arg BASE_IMAGE="${MANUAL_BASE_IMAGE}" \
            --build-arg GPU_ARCH="${GPU_ARCH}" \
            --build-arg AITER_REPO="${AITER_REPO}" \
            --build-arg AITER_COMMIT="${AITER_COMMIT}" \
            --build-arg RCCL_REPO="${RCCL_REPO}" \
            --build-arg RCCL_BRANCH="${RCCL_BRANCH}" \
            --build-arg CACHEBUST="$(date +%s)" \
            -f "${BUILD_CONTEXT}/docker/Dockerfile.manual" \
            "${BUILD_CONTEXT}"

          DOCKER_BUILDKIT=1 docker build --network=host \
            -t "${OOT_IMAGE_TAG}" \
            --target atom_oot \
            --build-arg OOT_BASE_IMAGE="${MANUAL_BASE_IMAGE_TAG}" \
            --build-arg MAX_JOBS=64 \
            --build-arg VLLM_COMMIT="${VLLM_COMMIT}" \
            --build-arg INSTALL_LM_EVAL=1 \
            --build-arg INSTALL_FASTSAFETENSORS=1 \
            -f "${BUILD_CONTEXT}/docker/Dockerfile.manual" \
            "${BUILD_CONTEXT}"

          docker push "${OOT_IMAGE_TAG}"

          echo "oot_image_tag=${OOT_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "cleanup_temp_image=true" >> "$GITHUB_OUTPUT"
          echo "manual_base_image_tag=${MANUAL_BASE_IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Clean up builder images
        if: ${{ always() && steps.meta.outputs.cleanup_temp_image == 'true' }}
        run: |
          docker rmi "${{ steps.meta.outputs.oot_image_tag }}" || true
          docker rmi "${{ steps.meta.outputs.manual_base_image_tag }}" || true

  plugin-ut:
    name: Plugin UT (OOT image)
    needs: [prepare-oot-image]
    runs-on: linux-atom-mi355-1
    timeout-minutes: 60
    steps:
      - name: Checkout ATOM repo
        uses: actions/checkout@v6

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Pull OOT image
        run: |
          docker pull "${{ needs.prepare-oot-image.outputs.oot_image_tag }}"

      - name: Run all plugin unit tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "${{ needs.prepare-oot-image.outputs.oot_image_tag }}" \
            bash -lc "pytest -q tests/plugin -o cache_dir=/tmp/.pytest_cache"

      - name: Clean up pulled image
        if: always()
        run: |
          docker rmi "${{ needs.prepare-oot-image.outputs.oot_image_tag }}" || true

  oot-model-accuracy:
    name: OOT Model Accuracy (${{ matrix.model_name }})
    needs: [prepare-oot-image, plugin-ut]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-oot-image.outputs.model_matrix) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    env:
      CONTAINER_NAME: atom_vllm_oot_validation_${{ strategy.job-index }}
      OOT_IMAGE_TAG: ${{ needs.prepare-oot-image.outputs.oot_image_tag }}
    steps:
      - name: Checkout ATOM repo
        uses: actions/checkout@v6

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Set HF_TOKEN
        run: echo "HF_TOKEN=${HF_TOKEN:-${{ secrets.AMD_HF_TOKEN }}}" >> "$GITHUB_ENV"

      - name: Pull OOT image
        run: |
          docker pull "${OOT_IMAGE_TAG}"

      - name: Prepare model cache mount
        run: |
          model_path="${{ matrix.model_path }}"
          MODEL_CACHE_HOST_ROOT=""
          MODEL_CACHE_MOUNT=""
          MODEL_CACHE_DESC="container-local /models (no host cache mount)"

          if [ -d "/models/${model_path}" ] && [ -f "/models/${model_path}/config.json" ]; then
            MODEL_CACHE_HOST_ROOT="/models"
            MODEL_CACHE_DESC="/models (pre-provisioned host path)"
          elif [ -d "/data/models/${model_path}" ] && [ -f "/data/models/${model_path}/config.json" ]; then
            MODEL_CACHE_HOST_ROOT="/data/models"
            MODEL_CACHE_DESC="/data/models (pre-provisioned host path)"
          elif [ -d "/models" ] && [ -w "/models" ]; then
            MODEL_CACHE_HOST_ROOT="/models"
            MODEL_CACHE_DESC="/models (writable host path)"
          elif [ -d "/data/models" ] && [ -w "/data/models" ]; then
            MODEL_CACHE_HOST_ROOT="/data/models"
            MODEL_CACHE_DESC="/data/models (writable host path)"
          fi

          if [ -n "${MODEL_CACHE_HOST_ROOT}" ]; then
            if mkdir -p "${MODEL_CACHE_HOST_ROOT}/${model_path}"; then
              MODEL_CACHE_MOUNT="-v ${MODEL_CACHE_HOST_ROOT}:/models"
              echo "Model cache host root: ${MODEL_CACHE_HOST_ROOT}"
            else
              MODEL_CACHE_HOST_ROOT=""
              MODEL_CACHE_DESC="container-local /models (no writable host cache mount)"
            fi
          fi

          if [ -z "${MODEL_CACHE_MOUNT}" ]; then
            echo "No writable host model cache found; using container-local /models."
          fi

          echo "Using model cache backend: ${MODEL_CACHE_DESC}"
          echo "MODEL_CACHE_MOUNT=${MODEL_CACHE_MOUNT}" >> "$GITHUB_ENV"
          echo "MODEL_CACHE_DESC=${MODEL_CACHE_DESC}" >> "$GITHUB_ENV"

      - name: Clean up old containers
        run: |
          containers=$(docker ps -q)
          if [ -n "$containers" ]; then
            docker kill $containers || true
          fi
          docker rm -f "$CONTAINER_NAME" 2>/dev/null || true

      - name: Start validation container
        run: |
          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi

          MODEL_MOUNT="${MODEL_CACHE_MOUNT}"
          echo "Using model cache backend: ${MODEL_CACHE_DESC}"

          cat > /tmp/oot_env_file.txt << 'EOF'
          ${{ matrix.env_vars }}
          EOF

          docker run -dt --device=/dev/kfd $DEVICE_FLAG \
            -v "${GITHUB_WORKSPACE:-$PWD}":/workspace \
            $MODEL_MOUNT \
            -w /workspace \
            --ipc=host --group-add video \
            --shm-size=16G \
            --privileged \
            --cap-add=SYS_PTRACE \
            --security-opt seccomp=unconfined \
            --ulimit memlock=-1 \
            --ulimit stack=67108864 \
            --env-file /tmp/oot_env_file.txt \
            -e HF_TOKEN="${HF_TOKEN:-}" \
            --name "$CONTAINER_NAME" \
            "${OOT_IMAGE_TAG}"
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Download model if needed
        run: |
          model_dir="/models/${{ matrix.model_path }}"
          if docker exec "$CONTAINER_NAME" bash -lc "[ -d \"$model_dir\" ] && [ -f \"$model_dir/config.json\" ]"; then
            echo "Model already exists under ${model_dir}; skip download"
          else
            echo "Model not found under ${model_dir}; downloading model"
            if ! docker exec -e HF_TOKEN="${HF_TOKEN:-}" "$CONTAINER_NAME" bash -lc "hf download ${{ matrix.model_path }} --local-dir \"$model_dir\""; then
              echo "Model download failed for '${{ matrix.model_path }}'. Aborting."
              exit 1
            fi
          fi

      - name: Resolve OOT model path
        if: success()
        run: |
          if docker exec "$CONTAINER_NAME" bash -lc "[ -d \"/models/${{ matrix.model_path }}\" ] && [ -f \"/models/${{ matrix.model_path }}/config.json\" ]"; then
            echo "OOT_RESOLVED_MODEL_PATH=/models/${{ matrix.model_path }}" >> "$GITHUB_ENV"
            echo "Using pre-downloaded model path: /models/${{ matrix.model_path }}"
          else
            echo "OOT_RESOLVED_MODEL_PATH=${{ matrix.model_path }}" >> "$GITHUB_ENV"
            echo "Using model id: ${{ matrix.model_path }}"
          fi

      - name: Run OOT launch and gsm8k accuracy via script (full mode)
        timeout-minutes: 120
        env:
          OOT_MODEL_NAME: ${{ matrix.model_name }}
          OOT_MODEL_PATH: ${{ matrix.model_path }}
          OOT_EXTRA_ARGS: ${{ matrix.extra_args }}
          OOT_ENV_VARS: ${{ matrix.env_vars }}
          MAX_WAIT_RETRIES: "120"
          STREAM_VLLM_LOGS: "1"
        run: |
          docker exec \
            -e OOT_MODEL_NAME="${OOT_MODEL_NAME}" \
            -e OOT_MODEL_PATH="${OOT_RESOLVED_MODEL_PATH:-$OOT_MODEL_PATH}" \
            -e OOT_EXTRA_ARGS="${OOT_EXTRA_ARGS}" \
            -e OOT_ENV_VARS="${OOT_ENV_VARS}" \
            -e MAX_WAIT_RETRIES="${MAX_WAIT_RETRIES}" \
            -e STREAM_VLLM_LOGS="${STREAM_VLLM_LOGS}" \
            "$CONTAINER_NAME" bash -lc "
              set -euo pipefail
              bash .github/scripts/atom_oot_test.sh accuracy full
            "

      - name: Check OOT accuracy test results
        if: success()
        run: |
          docker cp "$CONTAINER_NAME":/tmp/oot_accuracy_results ./oot_accuracy_results || true
          result_file=$(ls -1t oot_accuracy_results/*.json 2>/dev/null | head -n 1)
          if [ -z "$result_file" ] || [ ! -f "$result_file" ]; then
            echo "ERROR: No results JSON file found in oot_accuracy_results/"
            exit 2
          fi

          echo "RESULT_FILE: $result_file"
          flexible_extract_value=$(jq '.results.gsm8k["exact_match,flexible-extract"]' "$result_file")
          echo "Flexible extract value: $flexible_extract_value"
          echo "Accuracy test threshold: ${{ matrix.accuracy_test_threshold }}"

          result=$(awk -v val="$flexible_extract_value" -v threshold="${{ matrix.accuracy_test_threshold }}" 'BEGIN {print (val < threshold) ? 1 : 0}')
          if [ "$result" -eq 1 ]; then
            echo "Accuracy test failed: Flexible extract value $flexible_extract_value is less than threshold ${{ matrix.accuracy_test_threshold }}."
            exit 1
          else
            echo "Accuracy test passed: Flexible extract value $flexible_extract_value is greater than or equal to threshold ${{ matrix.accuracy_test_threshold }}."
            exit 0
          fi

      - name: Collect summary
        if: success()
        run: |
          echo "OOT gsm8k summary for ${{ matrix.model_name }}:" >> $GITHUB_STEP_SUMMARY
          docker exec "$CONTAINER_NAME" bash -lc "awk '/\|Tasks\|Version\|/,/^$/ { if (NF > 0) print }' /tmp/oot_accuracy_output.txt" >> $GITHUB_STEP_SUMMARY || true

      - name: Collect artifacts
        if: always()
        run: |
          docker cp "$CONTAINER_NAME":/tmp/vllm_oot.log ./vllm_oot.log || true
          docker cp "$CONTAINER_NAME":/tmp/oot_accuracy_output.txt ./oot_accuracy_output.txt || true
          docker cp "$CONTAINER_NAME":/tmp/oot_accuracy_results ./oot_accuracy_results || true

      - name: Upload model artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oot-validation-${{ matrix.model_name }}-${{ github.run_id }}
          path: |
            vllm_oot.log
            oot_accuracy_output.txt
            oot_accuracy_results

      - name: Cleanup
        if: always()
        run: |
          docker exec "$CONTAINER_NAME" bash -lc "if [ -f /tmp/vllm_oot.pid ]; then kill \$(cat /tmp/vllm_oot.pid) || true; fi" || true
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true
          docker rmi "${OOT_IMAGE_TAG}" || true
