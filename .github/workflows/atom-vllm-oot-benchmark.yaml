name: ATOM vLLM OOT Benchmark

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  workflow_dispatch:
    inputs:
      deepseek-r1-fp8:
        description: "Benchmark DeepSeek-R1 FP8"
        type: boolean
        default: false
      deepseek-r1-mxfp4:
        description: "Benchmark DeepSeek-R1 MXFP4"
        type: boolean
        default: false
      gpt-oss-120b:
        description: "Benchmark gpt-oss-120b"
        type: boolean
        default: false
      kimi-k2-thinking-mxfp4-tp4:
        description: "Benchmark Kimi-K2-Thinking-MXFP4 TP4"
        type: boolean
        default: false
      kimi-k2-thinking-mxfp4-tp8:
        description: "Benchmark Kimi-K2-Thinking-MXFP4 TP8"
        type: boolean
        default: false
      qwen3-5-397b-a17b-fp8:
        description: "Benchmark Qwen3.5-397B-A17B-FP8"
        type: boolean
        default: false
      oot_image:
        description: "OOT benchmark image to pull directly"
        type: string
        default: "rocm/atom-dev:vllm-latest"
      param_lists:
        description: |
          "Benchmark parameter lists.
          Input as a single or multiple sets (comma-separated, semicolon between sets),
          format: input_length,output_length,concurrency,random_range_ratio.
          Example (single set): 1024,1024,64,0.8
          Example (multiple sets): 1024,1024,64,0.8;2048,1024,32,0.7"
        type: string
        default: "1024,1024,4,0.8;1024,1024,8,0.8;1024,1024,16,0.8;1024,1024,32,0.8;1024,1024,64,0.8;1024,8192,4,0.8;1024,8192,8,0.8;1024,8192,16,0.8;1024,8192,32,0.8;1024,8192,64,0.8;8192,1024,4,0.8;8192,1024,8,0.8;8192,1024,16,0.8;8192,1024,32,0.8;8192,1024,64,0.8"

jobs:
  parse-param-lists:
    name: Parse parameter lists
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.parse-param-lists.outputs.matrix_json }}
      param_lists: ${{ steps.parse-param-lists.outputs.param_lists }}
    steps:
      - name: Parse parameter lists
        id: parse-param-lists
        run: |
          PARAM_LISTS="${{ inputs.param_lists || '1024,1024,4,0.8;1024,1024,8,0.8;1024,1024,16,0.8;1024,1024,32,0.8;1024,1024,64,0.8;1024,8192,4,0.8;1024,8192,8,0.8;1024,8192,16,0.8;1024,8192,32,0.8;1024,8192,64,0.8;8192,1024,4,0.8;8192,1024,8,0.8;8192,1024,16,0.8;8192,1024,32,0.8;8192,1024,64,0.8' }}"
          echo "Using param_lists: ${PARAM_LISTS}"
          printf 'param_lists=%s\n' "${PARAM_LISTS}" >> "$GITHUB_OUTPUT"
          IFS=';' read -ra SETS <<< "${PARAM_LISTS}"
          MATRIX_JSON="["
          SEP=""
          for SET in "${SETS[@]}"; do
            IFS=',' read -ra PARAMS <<< "$SET"
            INPUT_LEN="${PARAMS[0]}"
            OUTPUT_LEN="${PARAMS[1]}"
            CONCURRENCY="${PARAMS[2]}"
            RANDOM_RANGE_RATIO="${PARAMS[3]}"
            case "${CONCURRENCY}" in
              4|8|16|32|64) ;;
              *)
                echo "Unsupported concurrency: ${CONCURRENCY}. Allowed values: 4,8,16,32,64"
                exit 1
                ;;
            esac
            MATRIX_JSON="${MATRIX_JSON}${SEP}{\"input_length\":${INPUT_LEN},\"output_length\":${OUTPUT_LEN},\"concurrency\":${CONCURRENCY},\"random_range_ratio\":${RANDOM_RANGE_RATIO}}"
            SEP=","
          done
          MATRIX_JSON="${MATRIX_JSON}]"
          echo "matrix_json=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"

      - name: Print matrix JSON
        run: |
          echo "Matrix JSON: ${{ steps.parse-param-lists.outputs.matrix_json }}"

  load-models:
    name: Load OOT model configs
    runs-on: ubuntu-latest
    outputs:
      models_json: ${{ steps.load.outputs.models_json }}
    steps:
      - uses: actions/checkout@v6
      - id: load
        run: echo "models_json=$(jq -c . .github/benchmark/oot_benchmark_models.json)" >> "$GITHUB_OUTPUT"

  benchmark:
    name: OOT ${{ matrix.model.display }} ${{ matrix.params.input_length }}/${{ matrix.params.output_length }} c=${{ matrix.params.concurrency }}
    needs: [parse-param-lists, load-models]
    if: >-
      always()
      && needs.parse-param-lists.result == 'success'
      && needs.load-models.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.load-models.outputs.models_json) }}
        params: ${{ fromJson(needs.parse-param-lists.outputs.matrix_json) }}
    runs-on: ${{ matrix.model.runner }}
    timeout-minutes: 240
    env:
      MODEL_NAME: ${{ matrix.model.display }}
      DASHBOARD_MODEL_NAME: ${{ matrix.model.dashboard_model || '' }}
      MODEL_SOURCE_PATH: ${{ matrix.model.source_path || matrix.model.path }}
      MODEL_PATH: ${{ matrix.model.path }}
      OOT_EXTRA_ARGS: ${{ matrix.model.extra_args }}
      BENCH_EXTRA_ARGS: ${{ matrix.model.bench_args }}
      RESULT_PREFIX: ${{ matrix.model.prefix }}
      ISL: ${{ matrix.params.input_length }}
      OSL: ${{ matrix.params.output_length }}
      CONC: ${{ matrix.params.concurrency }}
      RANDOM_RANGE_RATIO: ${{ matrix.params.random_range_ratio }}
      RESULT_FILENAME: ${{ matrix.model.prefix }}-${{ matrix.params.input_length }}-${{ matrix.params.output_length }}-${{ matrix.params.concurrency }}-${{ matrix.params.random_range_ratio }}
      CONTAINER_NAME: atom_vllm_oot_benchmark_${{ strategy.job-index }}
      CONTAINER_RESULT_DIR: /tmp/oot-benchmark-results
      CONTAINER_BENCH_SERVING_DIR: /tmp/oot-benchmark/bench_serving
      OOT_IMAGE_TAG: ${{ inputs.oot_image || 'rocm/atom-dev:vllm-latest' }}
      BENCH_SERVING_REPO_URL: https://github.com/kimbochen/bench_serving.git
    steps:
      - name: Check if model is enabled
        id: check
        run: |
          case "${{ matrix.model.prefix }}" in
            deepseek-r1-fp8) echo "enabled=${{ inputs.deepseek-r1-fp8 }}" >> "$GITHUB_OUTPUT" ;;
            deepseek-r1-mxfp4) echo "enabled=${{ inputs.deepseek-r1-mxfp4 }}" >> "$GITHUB_OUTPUT" ;;
            gpt-oss-120b) echo "enabled=${{ inputs.gpt-oss-120b }}" >> "$GITHUB_OUTPUT" ;;
            kimi-k2-thinking-mxfp4-tp4) echo "enabled=${{ inputs.kimi-k2-thinking-mxfp4-tp4 }}" >> "$GITHUB_OUTPUT" ;;
            kimi-k2-thinking-mxfp4-tp8) echo "enabled=${{ inputs.kimi-k2-thinking-mxfp4-tp8 }}" >> "$GITHUB_OUTPUT" ;;
            qwen3-5-397b-a17b-fp8) echo "enabled=${{ inputs.qwen3-5-397b-a17b-fp8 }}" >> "$GITHUB_OUTPUT" ;;
            *) echo "enabled=true" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Clean up containers and workspace
        if: steps.check.outputs.enabled == 'true'
        run: |
          echo "=== Cleaning up containers on $(hostname) ==="
          containers=$(docker ps -q)
          if [ -n "$containers" ]; then
            docker kill $containers || true
          fi
          docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
          docker run --rm -v "${GITHUB_WORKSPACE:-$PWD}":/workspace -w /workspace --privileged rocm/pytorch:latest bash -lc "shopt -s dotglob && ls -la /workspace/ && rm -rf /workspace/*" || true

      - name: Checkout ATOM repo
        if: steps.check.outputs.enabled == 'true'
        uses: actions/checkout@v6

      - name: Docker Login
        if: steps.check.outputs.enabled == 'true'
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Set HF_TOKEN
        if: steps.check.outputs.enabled == 'true'
        run: echo "HF_TOKEN=${HF_TOKEN:-${{ secrets.AMD_HF_TOKEN }}}" >> "$GITHUB_ENV"

      - name: Pull OOT benchmark image
        if: steps.check.outputs.enabled == 'true'
        run: |
          echo "Pulling OOT benchmark image: ${OOT_IMAGE_TAG}"
          docker pull "${OOT_IMAGE_TAG}"

      - name: Prepare model cache mount
        if: steps.check.outputs.enabled == 'true'
        run: |
          model_path="${MODEL_PATH}"
          model_cache_rel="${model_path#/models/}"
          MODEL_CACHE_HOST_ROOT=""
          MODEL_CACHE_MOUNT=""
          MODEL_CACHE_DESC="container-local /models (no host cache mount)"

          if [ -d "/models/${model_cache_rel}" ] && [ -f "/models/${model_cache_rel}/config.json" ]; then
            MODEL_CACHE_HOST_ROOT="/models"
            MODEL_CACHE_DESC="/models (pre-provisioned host path)"
          elif [ -d "/data/models/${model_cache_rel}" ] && [ -f "/data/models/${model_cache_rel}/config.json" ]; then
            MODEL_CACHE_HOST_ROOT="/data/models"
            MODEL_CACHE_DESC="/data/models (pre-provisioned host path)"
          elif [ -d "/models" ] && [ -w "/models" ]; then
            MODEL_CACHE_HOST_ROOT="/models"
            MODEL_CACHE_DESC="/models (writable host path)"
          elif [ -d "/data/models" ] && [ -w "/data/models" ]; then
            MODEL_CACHE_HOST_ROOT="/data/models"
            MODEL_CACHE_DESC="/data/models (writable host path)"
          fi

          if [ -n "${MODEL_CACHE_HOST_ROOT}" ]; then
            if mkdir -p "${MODEL_CACHE_HOST_ROOT}/${model_cache_rel}"; then
              MODEL_CACHE_MOUNT="-v ${MODEL_CACHE_HOST_ROOT}:/models"
              echo "Model cache host root: ${MODEL_CACHE_HOST_ROOT}"
            else
              MODEL_CACHE_HOST_ROOT=""
              MODEL_CACHE_DESC="container-local /models (no writable host cache mount)"
            fi
          fi

          if [ -z "${MODEL_CACHE_MOUNT}" ]; then
            echo "No writable host model cache found; using container-local /models."
          fi

          echo "Using model cache backend: ${MODEL_CACHE_DESC}"
          echo "MODEL_CACHE_MOUNT=${MODEL_CACHE_MOUNT}" >> "$GITHUB_ENV"
          echo "MODEL_CACHE_DESC=${MODEL_CACHE_DESC}" >> "$GITHUB_ENV"

      - name: Start OOT benchmark container
        if: steps.check.outputs.enabled == 'true'
        run: |
          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi

          MODEL_MOUNT="${MODEL_CACHE_MOUNT}"
          echo "Using model cache backend: ${MODEL_CACHE_DESC}"

          cat > /tmp/oot_env_file.txt << 'EOF'
          ${{ matrix.model.env_vars }}
          EOF

          docker run -dt --device=/dev/kfd $DEVICE_FLAG \
            -v "${GITHUB_WORKSPACE:-$PWD}":/workspace \
            $MODEL_MOUNT \
            -w /workspace \
            --ipc=host --group-add video \
            --shm-size=16G \
            --privileged \
            --cap-add=SYS_PTRACE \
            --security-opt seccomp=unconfined \
            --ulimit memlock=-1 \
            --ulimit stack=67108864 \
            --env-file /tmp/oot_env_file.txt \
            -e HF_TOKEN="${HF_TOKEN:-}" \
            --name "$CONTAINER_NAME" \
            "${OOT_IMAGE_TAG}"
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Collect GPU info (inside container)
        if: steps.check.outputs.enabled == 'true'
        id: gpu-info
        run: |
          GPU_NAME=$(docker exec "$CONTAINER_NAME" rocm-smi --showproductname 2>/dev/null | grep -i "Card Series" | head -1 | sed 's/.*:\s*//' || echo "")
          GPU_VRAM_GB=$(docker exec "$CONTAINER_NAME" rocm-smi --showmeminfo vram 2>/dev/null | grep -i "VRAM Total Memory" | head -1 | awk -F: '{printf "%.0f", $NF/(1024*1024*1024)}' || echo "0")
          ROCM_VERSION=$(docker exec "$CONTAINER_NAME" cat /opt/rocm/.info/version 2>/dev/null || echo "unknown")
          echo "gpu_name=${GPU_NAME}" >> $GITHUB_OUTPUT
          echo "gpu_vram_gb=${GPU_VRAM_GB}" >> $GITHUB_OUTPUT
          echo "rocm_version=${ROCM_VERSION}" >> $GITHUB_OUTPUT
          echo "GPU: ${GPU_NAME}, VRAM: ${GPU_VRAM_GB}GB, ROCm: ${ROCM_VERSION}"

      - name: Download model if needed
        if: steps.check.outputs.enabled == 'true'
        run: |
          model_dir="${MODEL_PATH}"
          if docker exec "$CONTAINER_NAME" bash -lc "[ -d \"$model_dir\" ] && [ -f \"$model_dir/config.json\" ]"; then
            echo "Model already exists under ${model_dir}; skip download"
          else
            echo "Model not found under ${model_dir}; downloading model"
            if ! docker exec -e HF_TOKEN="${HF_TOKEN:-}" "$CONTAINER_NAME" bash -lc "hf download \"${MODEL_SOURCE_PATH}\" --local-dir \"$model_dir\""; then
              echo "Model download failed for '${MODEL_SOURCE_PATH}'. Aborting."
              exit 1
            fi
          fi

      - name: Resolve OOT model path
        if: steps.check.outputs.enabled == 'true'
        run: |
          if docker exec "$CONTAINER_NAME" bash -lc "[ -d \"${MODEL_PATH}\" ] && [ -f \"${MODEL_PATH}/config.json\" ]"; then
            echo "OOT_RESOLVED_MODEL_PATH=${MODEL_PATH}" >> "$GITHUB_ENV"
            echo "Using pre-downloaded model path: ${MODEL_PATH}"
          else
            echo "OOT_RESOLVED_MODEL_PATH=${MODEL_SOURCE_PATH}" >> "$GITHUB_ENV"
            echo "Using model id: ${MODEL_SOURCE_PATH}"
          fi

      - name: Prepare OOT benchmark runner in container
        if: steps.check.outputs.enabled == 'true'
        run: |
          docker exec "$CONTAINER_NAME" bash -lc "
            set -euo pipefail
            rm -rf \"${CONTAINER_BENCH_SERVING_DIR%/bench_serving}\"
            mkdir -p \"${CONTAINER_BENCH_SERVING_DIR%/bench_serving}\"
            git clone --depth 1 \"${BENCH_SERVING_REPO_URL}\" \"${CONTAINER_BENCH_SERVING_DIR}\"
            test -f \"${CONTAINER_BENCH_SERVING_DIR}/benchmark_serving.py\"
          "

      - name: Run OOT benchmark
        if: steps.check.outputs.enabled == 'true'
        timeout-minutes: 240
        env:
          MAX_WAIT_RETRIES: "120"
          STREAM_VLLM_LOGS: "1"
        run: |
          set -euo pipefail
          docker exec \
            -e OOT_MODEL_NAME="${MODEL_NAME}" \
            -e OOT_MODEL_PATH="${OOT_RESOLVED_MODEL_PATH:-$MODEL_PATH}" \
            -e OOT_EXTRA_ARGS="${OOT_EXTRA_ARGS}" \
            -e MAX_WAIT_RETRIES="${MAX_WAIT_RETRIES}" \
            -e STREAM_VLLM_LOGS="${STREAM_VLLM_LOGS}" \
            -e KEEP_SERVER_ALIVE_ON_EXIT=1 \
            "$CONTAINER_NAME" bash -lc "
              set -euo pipefail
              bash .github/scripts/atom_oot_test.sh launch full
            "

          TRUST_REMOTE_CODE_ARG=""
          if [[ "${OOT_EXTRA_ARGS}" == *"--trust-remote-code"* ]]; then
            TRUST_REMOTE_CODE_ARG="--trust-remote-code"
          fi

          echo "=== Benchmark config: ${MODEL_NAME} ISL=${ISL} OSL=${OSL} CONC=${CONC} RANDOM_RANGE_RATIO=${RANDOM_RANGE_RATIO} ==="

          docker exec \
            -e ISL="${ISL}" \
            -e OSL="${OSL}" \
            -e CONC="${CONC}" \
            -e RANDOM_RANGE_RATIO="${RANDOM_RANGE_RATIO}" \
            -e RESULT_FILENAME="${RESULT_FILENAME}" \
            -e BENCH_EXTRA_ARGS="${BENCH_EXTRA_ARGS}" \
            "$CONTAINER_NAME" bash -lc "
              set -euo pipefail
              rm -rf \"${CONTAINER_RESULT_DIR}\"
              mkdir -p \"${CONTAINER_RESULT_DIR}\"
              PYTHONDONTWRITEBYTECODE=1 python \"${CONTAINER_BENCH_SERVING_DIR}/benchmark_serving.py\" \
                --model=\"${OOT_RESOLVED_MODEL_PATH:-$MODEL_PATH}\" \
                --backend=vllm \
                --base-url=http://127.0.0.1:8000 \
                --dataset-name=random \
                --random-input-len=\"${ISL}\" \
                --random-output-len=\"${OSL}\" \
                --random-range-ratio \"${RANDOM_RANGE_RATIO}\" \
                --num-prompts=\"$(( CONC * 10 ))\" \
                --max-concurrency=\"${CONC}\" \
                ${TRUST_REMOTE_CODE_ARG} \
                --num-warmups=\"$(( 2 * CONC ))\" \
                --request-rate=inf \
                --ignore-eos \
                --save-result \
                --percentile-metrics=\"ttft,tpot,itl,e2el\" \
                --result-dir=\"${CONTAINER_RESULT_DIR}\" \
                --result-filename=\"${RESULT_FILENAME}.json\" \
                ${BENCH_EXTRA_ARGS:-}
            "

          docker exec \
            -e RESULT_PATH="${CONTAINER_RESULT_DIR}/${RESULT_FILENAME}.json" \
            -e ISL="${ISL}" \
            -e OSL="${OSL}" \
            -e EXTRA_ARGS_TEXT="${OOT_EXTRA_ARGS}" \
            -e DASHBOARD_MODEL_NAME="${DASHBOARD_MODEL_NAME}" \
            "$CONTAINER_NAME" python3 -c "import json, os, re; result_path = os.environ['RESULT_PATH']; data = json.load(open(result_path, encoding='utf-8')); data['random_input_len'] = int(os.environ['ISL']); data['random_output_len'] = int(os.environ['OSL']); data['benchmark_backend'] = 'ATOM-vLLM'; display_name = os.environ.get('DASHBOARD_MODEL_NAME', ''); display_name and data.__setitem__('benchmark_model_name', display_name); tp_match = re.search(r'--tensor-parallel-size\\s+(\\d+)', os.environ.get('EXTRA_ARGS_TEXT', '')); tp_match and data.__setitem__('tensor_parallel_size', int(tp_match.group(1))); json.dump(data, open(result_path, 'w', encoding='utf-8'), indent=2)"

          docker cp "${CONTAINER_NAME}:${CONTAINER_RESULT_DIR}/${RESULT_FILENAME}.json" "./${RESULT_FILENAME}.json"

      - name: Inject GPU metadata into benchmark results
        if: steps.check.outputs.enabled == 'true'
        run: |
          shopt -s nullglob
          for f in "${RESULT_PREFIX}"-*.json; do
            GPU_NAME="${{ steps.gpu-info.outputs.gpu_name }}" \
            GPU_VRAM_GB="${{ steps.gpu-info.outputs.gpu_vram_gb }}" \
            ROCM_VERSION="${{ steps.gpu-info.outputs.rocm_version }}" \
            RESULT_PATH="$f" \
            python3 -c "
          import json, os
          p = os.environ['RESULT_PATH']
          with open(p) as f:
              d = json.load(f)
          d['gpu_name'] = os.environ.get('GPU_NAME', '')
          d['gpu_vram_gb'] = int(os.environ.get('GPU_VRAM_GB') or 0)
          d['rocm_version'] = os.environ.get('ROCM_VERSION', '')
          with open(p, 'w') as f:
              json.dump(d, f, indent=2)
          "
          done

      - name: Collect benchmark result
        if: steps.check.outputs.enabled == 'true'
        run: |
          if [ ! -f "${RESULT_FILENAME}.json" ]; then
            echo "ERROR: Benchmark result file ${RESULT_FILENAME}.json was not generated for ${MODEL_NAME}."
            exit 1
          fi

      - name: Upload benchmark result
        if: steps.check.outputs.enabled == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: oot-benchmark-${{ env.RESULT_FILENAME }}
          path: ${{ env.RESULT_FILENAME }}.json

      - name: Clean up OOT benchmark container
        if: always() && steps.check.outputs.enabled == 'true'
        run: |
          docker exec "$CONTAINER_NAME" bash -lc "if [ -f /tmp/vllm_oot.pid ]; then kill \$(cat /tmp/vllm_oot.pid) || true; fi" || true
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true

  summarize-benchmark-result:
    if: always()
    name: Summarize OOT benchmark result
    needs: [benchmark]
    runs-on: ubuntu-latest
    outputs:
      has_regression: ${{ steps.check-regression.outputs.has_regression }}
      has_results: ${{ steps.check-results.outputs.has_results }}
    steps:
      - name: Checkout ATOM repo
        uses: actions/checkout@v6

      - name: Download all benchmark results
        uses: actions/download-artifact@v8
        with:
          pattern: 'oot-benchmark-*'
          merge-multiple: true
          path: .
        continue-on-error: true

      - name: Check downloaded results
        id: check-results
        run: |
          shopt -s nullglob
          json_files=(*.json)
          if [ "${#json_files[@]}" -gt 0 ]; then
            echo "has_results=true" >> "$GITHUB_OUTPUT"
            printf 'Downloaded %s benchmark result files\n' "${#json_files[@]}"
          else
            echo "has_results=false" >> "$GITHUB_OUTPUT"
            echo "No benchmark result JSON files were downloaded."
          fi

      - name: Download baseline from previous successful manual run
        if: steps.check-results.outputs.has_results == 'true'
        id: baseline
        run: |
          PREV_RUN_ID=$(gh run list \
            --workflow="ATOM vLLM OOT Benchmark" \
            --branch=main \
            --event=workflow_dispatch \
            --status=success \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')

          if [ -n "$PREV_RUN_ID" ] && [ "$PREV_RUN_ID" != "${{ github.run_id }}" ]; then
            echo "Downloading baseline from run #$PREV_RUN_ID"
            mkdir -p /tmp/baseline
            gh run download "$PREV_RUN_ID" --dir /tmp/baseline || echo "::warning::Failed to download baseline artifacts"
            echo "baseline_dir=/tmp/baseline" >> "$GITHUB_OUTPUT"
          else
            echo "No previous successful manual run found"
            echo "baseline_dir=" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Summarize benchmark result
        if: steps.check-results.outputs.has_results == 'true'
        id: check-regression
        run: |
          BASELINE_ARG=""
          if [ -n "${{ steps.baseline.outputs.baseline_dir }}" ]; then
            BASELINE_ARG="--baseline-dir ${{ steps.baseline.outputs.baseline_dir }}"
          fi
          .github/scripts/summarize.py . $BASELINE_ARG \
            --output-json regression_report.json \
            >> "$GITHUB_STEP_SUMMARY" || true

          if [ -f regression_report.json ]; then
            REG_COUNT=$(python3 -c "import json; print(json.load(open('regression_report.json'))['regression_count'])")
            if [ "$REG_COUNT" -gt 0 ]; then
              echo "has_regression=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_regression=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_regression=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload regression report
        if: steps.check-results.outputs.has_results == 'true' && steps.check-regression.outputs.has_regression == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: oot-benchmark-regression-report
          path: regression_report.json

      - name: Transform results for benchmark dashboard
        if: steps.check-results.outputs.has_results == 'true'
        run: |
          python3 .github/scripts/oot_benchmark_to_dashboard.py \
            . \
            --output benchmark-action-input.json \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Store benchmark result to dashboard
        if: steps.check-results.outputs.has_results == 'true'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customBiggerIsBetter
          output-file-path: benchmark-action-input.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmark-dashboard
          auto-push: false
          alert-threshold: "80%"
          comment-on-alert: true
          fail-on-alert: false
          max-items-in-chart: 90
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy custom dashboard to gh-pages
        if: steps.check-results.outputs.has_results == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CURRENT_SHA=$(git rev-parse HEAD)
          cp .github/dashboard/index.html /tmp/dashboard_index.html
          cp docs/assets/atom_logo.png /tmp/dashboard_logo.png
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/dashboard_index.html benchmark-dashboard/index.html
