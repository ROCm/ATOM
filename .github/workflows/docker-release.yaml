name: Docker Release

on:
  pull_request:
    branches: [main] # For testing
  workflow_dispatch:

jobs:
  docker-release:
    name: Docker Release
    runs-on: atom-mi355-1gpu

    steps:
      - name: Checkout ATOM repo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build --network=host -t atom_release:ci -f docker/Dockerfile .
          docker inspect atom_release:ci

      - name: Test Docker image
        run: |
          docker run -dt --device=/dev/kfd --device=/dev/dri --group-add video --cap-add=SYS_PTRACE --security-opt seccomp=unconfined --ulimit memlock=-1 --ulimit stack=67108864 --name atom_release atom_release:ci
          docker exec atom_release bash -c "python3 -m atom.examples.simple_inference --model meta-llama/Meta-Llama-3-8B-Instruct --temperature 0 | grep -E '^Prompt: |^Completion:'"
    
      - name: Clean Up
        if: always()
        run: |
          docker stop atom_release || true
          docker rm atom_release || true
