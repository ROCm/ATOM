name: ATOM Benchmark

on:
  workflow_dispatch:
    inputs:
      deepseek-r1-0528:
        description: "Benchmark DeepSeek-R1-0528"
        type: boolean
        default: true
      gpt-oss-120b:
        description: "Benchmark gpt-oss-120b"
        type: boolean
        default: false
      args:
        description: "Arguments to pass to the ATOM server (default: --kv_cache_dtype fp8)"
        type: string
        default: "--kv_cache_dtype fp8"
      image:
        description: "Image to use for the benchmark"
        type: string
        default: "rocm/atom:latest"
      isl:
        description: "Input length"
        type: string
        default: "1024"
      osl:
        description: "Output length"
        type: string
        default: "1024"
      conc:
        description: "Concurrency"
        type: string
        default: "128"
      num_prompts:
        description: "Number of prompts"
        type: string
        default: "1280"
      random_range_ratio:
        description: "Random range ratio"
        type: string
        default: "0.8"
env:
  ISL: ${{ inputs.isl }}
  OSL: ${{ inputs.osl }}
  CONC: ${{ inputs.conc }}
  NUM_PROMPTS: ${{ inputs.num_prompts }}
  RANDOM_RANGE_RATIO: ${{ inputs.random_range_ratio }}

jobs:
  atom-benchmark:
    name: ATOM Benchmark
    strategy:
      fail-fast: false
      matrix:
        include:
        - model_name: "DeepSeek-R1-0528"
          model_path: "deepseek-ai/DeepSeek-R1-0528"
          extraArgs: "--kv_cache_dtype fp8"
          env_vars: ""
          runner: atom-mi355-8gpu.predownload
          enabled: ${{ inputs.deepseek-r1-0528 }}
        - model_name: "gpt-oss-120b"
          model_path: "openai/gpt-oss-120b"
          extraArgs: "--kv_cache_dtype fp8"
          env_vars: |
            ATOM_GPT_OSS_MODEL=1
          runner: atom-mi355-1gpu
          enabled: ${{ inputs.gpt-oss-120b }}

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check if benchmark is enabled
        run: |
          if ${{ matrix.enabled }} == true; then
            echo "Benchmark is enabled"
          else
            echo "Benchmark is disabled"
            exit 0
          fi

      - name: Checkout ATOM repo
        uses: actions/checkout@v4

      - name: Print environment variables
        run: |
          echo "DeepSeek-R1-0528: ${{ inputs.deepseek-r1-0528 }}"
          echo "gpt-oss-120b: ${{ inputs.gpt-oss-120b }}"
          echo "ISL: ${{ inputs.isl }}"
          echo "OSL: ${{ inputs.osl }}"
          echo "CONC: ${{ inputs.conc }}"
          echo "NUM_PROMPTS: ${{ inputs.num_prompts }}"
          echo "RANDOM_RANGE_RATIO: ${{ inputs.random_range_ratio }}"
          echo "ARGS: ${{ matrix.extraArgs }}"
          echo "ATOM_IMAGE: ${{ inputs.image }}"

      - name: Start CI container
        run: |
          echo "Clean up containers..."
          docker ps -aq -f name=atom-benchmark | xargs -r docker stop | xargs -r docker rm

          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi

          if [ -d "/models" ]; then
            MODEL_MOUNT="-v /models:/models"
          else
            echo "Warning: /models directory not found on runner; skipping /models mount and disabling model pre-download optimization."
            MODEL_MOUNT=""
          fi

          cat > /tmp/env_file.txt << 'EOF'
          ${{ matrix.env_vars }}
          EOF

          echo "Starting container: atom-benchmark"
          echo "Model-specific environment variables for ${{ matrix.model_name }}:"
          cat /tmp/env_file.txt

          docker run -dt --device=/dev/kfd $DEVICE_FLAG \
          -v "${GITHUB_WORKSPACE:-$PWD}":/workspace \
          $MODEL_MOUNT \
          -w /workspace \
          --ipc=host --group-add video \
          --shm-size=16G \
          --privileged \
          --cap-add=SYS_PTRACE \
          -e HF_TOKEN="${HF_TOKEN:-}" \
          --env-file /tmp/env_file.txt \
          --security-opt seccomp=unconfined \
          --ulimit memlock=-1 \
          --ulimit stack=67108864 \
          -e ISL=${{ inputs.isl }} \
          -e OSL=${{ inputs.osl }} \
          -e CONC=${{ inputs.conc }} \
          -e NUM_PROMPTS=${{ inputs.num_prompts }} \
          -e RANDOM_RANGE_RATIO=${{ inputs.random_range_ratio }} \
          -v "${{ github.workspace }}:/workspace" \
          -w /workspace \
          --name atom-benchmark \
          ${{ inputs.image }}

        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Run benchmark
        timeout-minutes: 30
        run: |
          set -euo pipefail
          echo ""
          echo "========== Launching ATOM server =========="
          if [ -d "/models" ]; then
            model_path="/models/${{ matrix.model_path }}"
          else
            model_path="${{ matrix.model_path }}"
          fi
          docker exec atom-benchmark bash -lc "
            .github/scripts/atom_test.sh launch $model_path ${{ matrix.extraArgs }}
          "
          echo "========== Showing benchmark test output =========="
          docker exec atom-benchmark bash -lc "
            .github/scripts/atom_test.sh benchmark $model_path ${{ matrix.extraArgs }}
          "
          echo "========== Showing benchmark test output =========="
          cat result.json
      
      - name: Collect result
        run: |
          .github/scripts/collect_results.py result.json ${{ matrix.model_name }}
          cat agg_${{ matrix.model_name }}.json

      - name: Clean Up
        if: always()
        run: |
          # TODO: run a separate container for cleanup of the workspace due to permission issue to remove some pyc files under __pycache__ whose owners are root.
          # We should use non-root user to run the test to avoid this issue.
          set -x
          echo "========== Cleaning up workspace =========="
          docker run --rm -v "${GITHUB_WORKSPACE:-$PWD}":/workspace -w /workspace --privileged ${{ inputs.image }} bash -lc "rm -rf /workspace/atom/ /workspace/aiter/" || true
          docker stop atom-benchmark || true
          docker rm atom-benchmark || true
