name: Deploy Static Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/pages/**'
  workflow_dispatch:

# To add a new page:
#   1. Create .github/pages/<page-name>/index.html
#   2. Push to main
#   3. The workflow auto-discovers and deploys all subdirectories
#   4. URL: https://rocm.github.io/ATOM/<page-name>

jobs:
  deploy-pages:
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy all pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CURRENT_SHA=$(git rev-parse HEAD)

          # Save pages before switching branches
          cp -r .github/pages /tmp/pages_copy

          # Switch to gh-pages
          git fetch origin gh-pages
          git checkout gh-pages

          # Deploy subdirectories (clean first so stale files don't linger)
          for dir in /tmp/pages_copy/*/; do
            page_name=$(basename "$dir")
            git rm -r --quiet "$page_name" 2>/dev/null || true
            mkdir -p "$page_name"
            cp -r "$dir/." "$page_name/"
            git add "$page_name/"
            echo "Deployed: $page_name"
          done

          # Deploy root-level files (e.g., index.html redirect)
          for file in /tmp/pages_copy/*; do
            [ -f "$file" ] || continue
            cp "$file" "$(basename "$file")"
            git add "$(basename "$file")"
            echo "Deployed root file: $(basename "$file")"
          done

          git diff --cached --quiet || git commit -m "pages: deploy static pages"
          git push origin gh-pages
          git checkout "$CURRENT_SHA"
