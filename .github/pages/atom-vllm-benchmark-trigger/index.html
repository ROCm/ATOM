<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ATOM vLLM Benchmark Trigger</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <h1>ATOM vLLM Benchmark Trigger</h1>
        <p class="subtitle">
          Local trigger UI for richer model family -> TP selection, backed by
          <code>gh workflow run</code>.
        </p>
      </div>
      <div class="hero-badge">Local Tool</div>
    </header>

    <main class="layout">
      <section class="card form-card">
        <h2>Run Settings</h2>
        <div class="grid two-col">
          <label class="field">
            <span>Repository</span>
            <input id="repository" type="text" />
          </label>
          <label class="field">
            <span>Ref</span>
            <input id="ref" type="text" />
          </label>
          <label class="field">
            <span>Benchmark Client</span>
            <select id="benchmark-client">
              <option>InferenceMax bench</option>
              <option>vLLM bench</option>
            </select>
          </label>
          <label class="field">
            <span>OOT Image Override</span>
            <input id="oot-image" type="text" placeholder="Optional docker image" />
          </label>
          <label class="field">
            <span>ISL / OSL Pairs</span>
            <textarea id="isl-osl-pairs" rows="3"></textarea>
          </label>
          <label class="field">
            <span>Concurrency Values</span>
            <input id="concurrency-values" type="text" />
          </label>
          <label class="field">
            <span>Random Range Ratios</span>
            <input id="random-range-ratios" type="text" />
          </label>
          <div class="field checkbox-group">
            <label><input id="publish-to-dashboard" type="checkbox" /> Upload to dashboard</label>
            <label><input id="upload-to-custom-dashboard" type="checkbox" checked /> Upload to custom dashboard</label>
          </div>
        </div>
      </section>

      <section class="card selection-card">
        <div class="section-head">
          <div>
            <h2>Model Family Selection</h2>
            <p class="muted">
              Hover a family to open TP choices, then add it to the dispatch list.
            </p>
          </div>
          <div class="slot-count"><span id="selection-count">0</span> / 8 slots used</div>
        </div>

        <div class="selection-layout">
          <div class="catalog-panel">
            <div class="catalog-header">
              <input id="family-search" type="search" placeholder="Filter model families..." />
            </div>
            <div id="family-list" class="family-list"></div>
          </div>

          <div class="selected-panel">
            <h3>Selected Workflow Slots</h3>
            <div id="selected-slots" class="selected-slots"></div>
          </div>
        </div>
      </section>

      <section class="card action-card">
        <div class="actions">
          <button id="clear-selections" class="secondary">Clear selections</button>
          <button id="dispatch-run" class="primary">Trigger Workflow</button>
        </div>
        <pre id="dispatch-output" class="output">Ready.</pre>
      </section>
    </main>
  </div>

  <div id="tp-popover" class="tp-popover" hidden>
    <div class="tp-popover-card">
      <div class="tp-popover-head">
        <strong id="tp-popover-title">Model Family</strong>
        <span id="tp-popover-note" class="muted"></span>
      </div>
      <div id="tp-checkboxes" class="tp-checkboxes"></div>
      <div class="tp-actions">
        <button id="tp-select-all" class="secondary small">Select all</button>
        <button id="tp-add-selection" class="primary small">Add selection</button>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
