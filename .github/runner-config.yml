  linux-atom-mi35x-1:
    gpu_arch: MI355
    gpu_count: 1

  linux-atom-mi35x-4:
    gpu_arch: MI355
    gpu_count: 4

  linux-atom-mi35x-8:
    gpu_arch: MI355
