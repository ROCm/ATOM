    gpu_arch: MI355
    gpu_count: 8

  atom-mi355-8gpu-aac-runner:
    gpu_arch: MI355
    gpu_count: 8

  linux-atom-mi355-1:
    gpu_arch: MI355
    gpu_count: 1

  linux-atom-mi355-4:
    gpu_arch: MI355
    gpu_count: 4

  linux-atom-mi355-8:
    gpu_arch: MI355
    gpu_count: 8

  atom-mi355-8gpu-oot-benchmark:
    gpu_arch: MI355
    gpu_count: 8

