<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 22px sans-serif; fill: #111827; }
      .label { font: 600 16px sans-serif; fill: #111827; }
      .small { font: 13px sans-serif; fill: #374151; }
      .tiny { font: 12px sans-serif; fill: #4b5563; }
      .box { stroke: #1f2937; stroke-width: 1.5; rx: 10; ry: 10; }
      .line { stroke: #1f2937; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #6b7280; stroke-width: 1.4; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1400" height="760" fill="#ffffff"/>

  <text x="700" y="40" text-anchor="middle" class="title">Atomesh Fixture-Driven Test Harness Architecture</text>

  <!-- Fixture layer -->
  <rect x="40" y="115" width="300" height="230" fill="#dbeafe" class="box"/>
  <text x="190" y="145" text-anchor="middle" class="label">MockTestCase</text>
  <text x="65" y="180" class="small">request</text>
  <text x="65" y="199" class="tiny">prompt / messages / text</text>
  <text x="65" y="226" class="small">expected_response</text>
  <text x="65" y="245" class="tiny">golden JSON / SSE events</text>
  <text x="65" y="272" class="small">route.worker_kind</text>
  <text x="65" y="291" class="tiny">regular / prefill_decode</text>
  <text x="65" y="318" class="small">route.connection_mode / backend</text>
  <text x="65" y="337" class="tiny">http / grpc, sglang / vllm</text>

  <!-- Request layer -->
  <rect x="500" y="85" width="400" height="86" fill="#dbeafe" class="box"/>
  <text x="700" y="118" text-anchor="middle" class="label">VirtualRequest</text>
  <text x="700" y="144" text-anchor="middle" class="tiny">Build real Atomesh API request</text>
  <text x="700" y="160" text-anchor="middle" class="tiny">from fixture data</text>

  <!-- Harness layer -->
  <rect x="470" y="215" width="460" height="92" fill="#fef3c7" class="box"/>
  <text x="700" y="248" text-anchor="middle" class="label">TestHarness</text>
  <text x="700" y="274" text-anchor="middle" class="tiny">start workers, initialize registry</text>
  <text x="700" y="290" text-anchor="middle" class="tiny">create app, send request, assert result</text>

  <!-- Atomesh layer -->
  <rect x="420" y="345" width="560" height="210" fill="#eadcf8" class="box"/>
  <text x="700" y="377" text-anchor="middle" class="label">Atomesh</text>
  <text x="700" y="403" text-anchor="middle" class="tiny">real app / RouterFactory / worker registry</text>
  <text x="700" y="419" text-anchor="middle" class="tiny">router execution and backend forwarding</text>

  <rect x="455" y="450" width="240" height="86" fill="#38bdf8" class="box"/>
  <text x="575" y="480" text-anchor="middle" class="label">regular_worker_pool</text>
  <rect x="475" y="498" width="90" height="28" fill="#7dd3fc" class="box"/>
  <text x="520" y="517" text-anchor="middle" class="tiny">HTTP</text>
  <rect x="585" y="498" width="90" height="28" fill="#7dd3fc" class="box"/>
  <text x="630" y="517" text-anchor="middle" class="tiny">gRPC</text>

  <rect x="705" y="450" width="240" height="86" fill="#38bdf8" class="box"/>
  <text x="825" y="480" text-anchor="middle" class="label">pd_worker_pool</text>
  <rect x="725" y="498" width="90" height="28" fill="#7dd3fc" class="box"/>
  <text x="770" y="517" text-anchor="middle" class="tiny">HTTP</text>
  <rect x="835" y="498" width="90" height="28" fill="#7dd3fc" class="box"/>
  <text x="880" y="517" text-anchor="middle" class="tiny">gRPC</text>

  <!-- Virtual backend layer -->
  <rect x="100" y="620" width="440" height="94" fill="#dcfce7" class="box"/>
  <text x="320" y="650" text-anchor="middle" class="label">HTTP VirtualWorker</text>
  <text x="320" y="675" text-anchor="middle" class="tiny">Axum replay backend</text>
  <text x="320" y="692" text-anchor="middle" class="tiny">/generate, chat, completions, responses</text>
  <text x="320" y="709" text-anchor="middle" class="tiny">regular / PD topology, basic SSE replay</text>

  <rect x="820" y="600" width="460" height="128" fill="#dcfce7" class="box"/>
  <text x="1050" y="630" text-anchor="middle" class="label">gRPC VirtualGrpcWorker</text>
  <text x="1050" y="654" text-anchor="middle" class="tiny">one public worker interface</text>
  <text x="1050" y="671" text-anchor="middle" class="tiny">selected by fixture route.backend</text>
  <rect x="850" y="690" width="190" height="26" fill="#bbf7d0" class="box"/>
  <text x="945" y="708" text-anchor="middle" class="tiny">SglangVirtualGrpcService</text>
  <rect x="1060" y="690" width="190" height="26" fill="#bbf7d0" class="box"/>
  <text x="1155" y="708" text-anchor="middle" class="tiny">VllmVirtualGrpcService</text>

  <!-- Assertions -->
  <rect x="1040" y="220" width="300" height="112" fill="#fee2e2" class="box"/>
  <text x="1190" y="252" text-anchor="middle" class="label">Golden Assertions</text>
  <text x="1190" y="278" text-anchor="middle" class="tiny">status / response subset</text>
  <text x="1190" y="295" text-anchor="middle" class="tiny">SSE events / worker path</text>
  <text x="1190" y="312" text-anchor="middle" class="tiny">runtime router and worker state</text>

  <!-- Main arrows -->
  <path d="M340 160 C405 120 435 120 500 120" class="line"/>
  <path d="M700 171 L700 215" class="line"/>
  <path d="M700 307 L700 345" class="line"/>

  <path d="M520 536 C465 575 395 595 320 620" class="line"/>
  <path d="M770 536 C660 585 480 600 360 620" class="line"/>
  <path d="M630 536 C750 570 880 580 1010 600" class="line"/>
  <path d="M880 536 C930 565 990 580 1050 600" class="line"/>

  <path d="M320 620 C285 535 275 420 340 315" class="dash"/>
  <path d="M1050 600 C850 535 555 380 340 315" class="dash"/>
  <text x="58" y="430" class="tiny">fixtures drive</text>
  <text x="58" y="447" class="tiny">backend responses</text>

  <path d="M980 425 C1085 390 1160 355 1190 332" class="line"/>
  <path d="M540 667 C640 662 730 660 820 660" class="dash"/>
  <text x="680" y="646" text-anchor="middle" class="tiny">same harness abstraction</text>
  <text x="680" y="663" text-anchor="middle" class="tiny">over HTTP and gRPC backends</text>
</svg>
