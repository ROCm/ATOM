<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="680" viewBox="0 0 1400 680">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 24px sans-serif; fill: #111827; }
      .subtitle { font: 14px sans-serif; fill: #4b5563; }
      .label { font: 600 16px sans-serif; fill: #111827; }
      .small { font: 13px sans-serif; fill: #374151; }
      .tiny { font: 12px sans-serif; fill: #4b5563; }
      .box { stroke: #1f2937; stroke-width: 1.5; rx: 10; ry: 10; }
      .line { stroke: #1f2937; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #6b7280; stroke-width: 1.4; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1400" height="760" fill="#ffffff"/>

  <text x="700" y="38" text-anchor="middle" class="title">Atomesh Metrics Architecture Refactor</text>
  <text x="700" y="62" text-anchor="middle" class="subtitle">Before/After view of Mesh metrics recording and worker metrics aggregation</text>

  <!-- Before -->
  <rect x="40" y="105" width="315" height="520" fill="#dbeafe" class="box"/>
  <text x="63" y="139" class="label">Before</text>
  <text x="63" y="162" class="tiny">scattered call sites</text>

  <rect x="78" y="172" width="238" height="100" fill="#bfdbfe" class="box"/>
  <text x="92" y="200" class="small">middleware.rs</text>
  <text x="92" y="222" class="tiny">records request latency</text>
  <text x="92" y="241" class="tiny">normalizes route labels</text>
  <text x="92" y="260" class="tiny">calls metrics directly</text>

  <rect x="78" y="292" width="238" height="100" fill="#bfdbfe" class="box"/>
  <text x="92" y="320" class="small">routers/*</text>
  <text x="92" y="342" class="tiny">tracks routed requests</text>
  <text x="92" y="361" class="tiny">records stream timing</text>
  <text x="92" y="380" class="tiny">mixes business + metrics</text>

  <rect x="78" y="412" width="238" height="100" fill="#bfdbfe" class="box"/>
  <text x="92" y="440" class="small">core / policies</text>
  <text x="92" y="462" class="tiny">updates worker gauges</text>
  <text x="92" y="481" class="tiny">counts retries + CB trips</text>
  <text x="92" y="500" class="tiny">shares recorder details</text>

  <rect x="78" y="532" width="238" height="68" fill="#bfdbfe" class="box"/>
  <text x="92" y="556" class="small">server.rs</text>
  <text x="92" y="576" class="tiny">owned health routes</text>
  <text x="92" y="594" class="tiny">also served engine metrics</text>

  <!-- Metrics subsystem -->
  <rect x="390" y="105" width="610" height="520" fill="#eadcf8" class="box"/>
  <text x="410" y="133" class="label">After</text>
  <text x="410" y="156" class="tiny">observability/metrics/ owns metrics</text>

  <rect x="430" y="175" width="240" height="80" fill="#f3e8ff" class="box"/>
  <text x="448" y="199" class="small">schema.rs</text>
  <text x="448" y="221" class="tiny">metric names + HELP text</text>
  <text x="448" y="239" class="tiny">labels + path normalization</text>

  <rect x="720" y="175" width="240" height="80" fill="#f3e8ff" class="box"/>
  <text x="738" y="199" class="small">recorder.rs</text>
  <text x="738" y="221" class="tiny">MeshMetrics public facade</text>
  <text x="738" y="239" class="tiny">centralizes mesh_* writes</text>

  <rect x="430" y="300" width="240" height="80" fill="#f3e8ff" class="box"/>
  <text x="448" y="324" class="small">mesh_metrics.rs</text>
  <text x="448" y="346" class="tiny">starts Prometheus exporter</text>
  <text x="448" y="364" class="tiny">describes mesh_* metrics</text>

  <rect x="720" y="300" width="240" height="80" fill="#f3e8ff" class="box"/>
  <text x="738" y="324" class="small">engine_metrics.rs</text>
  <text x="738" y="346" class="tiny">scrapes worker /metrics</text>
  <text x="738" y="364" class="tiny">adds worker_addr label</text>

  <rect x="430" y="425" width="240" height="80" fill="#f3e8ff" class="box"/>
  <text x="448" y="449" class="small">routes.rs</text>
  <text x="448" y="471" class="tiny">health + ready endpoints</text>
  <text x="448" y="489" class="tiny">mounts /engine_metrics</text>

  <rect x="720" y="425" width="240" height="80" fill="#f3e8ff" class="box"/>
  <text x="738" y="449" class="small">config.rs</text>
  <text x="738" y="471" class="tiny">Prometheus bind config</text>
  <text x="738" y="489" class="tiny">histogram bucket policy</text>

  <rect x="430" y="555" width="530" height="55" fill="#fef3c7" class="box"/>
  <text x="448" y="580" class="small">deleted</text>
  <text x="448" y="598" class="tiny">observability/metrics.rs, core/metrics_aggregator.rs, WorkerManager::get_engine_metrics</text>

  <!-- Outputs -->
  <rect x="1040" y="105" width="320" height="520" fill="#ecfdf5" class="box"/>
  <text x="1060" y="133" class="label">Outputs</text>
  <text x="1060" y="156" class="tiny">export and scrape paths</text>

  <rect x="1075" y="175" width="250" height="105" fill="#dcfce7" class="box"/>
  <text x="1093" y="201" class="small">Prometheus exporter</text>
  <text x="1093" y="223" class="tiny">serves Mesh self metrics</text>
  <text x="1093" y="241" class="tiny">mesh_http_* + mesh_router_*</text>
  <text x="1093" y="259" class="tiny">mesh_worker_*, retry, cb</text>

  <rect x="1075" y="345" width="250" height="105" fill="#dcfce7" class="box"/>
  <text x="1093" y="371" class="small">/engine_metrics</text>
  <text x="1093" y="393" class="tiny">serves aggregated workers</text>
  <text x="1093" y="411" class="tiny">from worker /metrics scrape</text>
  <text x="1093" y="429" class="tiny">keeps engine metric names</text>

  <rect x="1075" y="530" width="250" height="70" fill="#dbeafe" class="box"/>
  <text x="1093" y="554" class="small">Backend workers</text>
  <text x="1093" y="576" class="tiny">SGLang / vLLM engines</text>
  <text x="1093" y="594" class="tiny">native Prometheus output</text>

  <!-- Flow arrows -->
  <path d="M316 222 C365 220 395 220 430 215" class="line"/>
  <path d="M316 342 C480 310 615 255 720 230" class="line"/>
  <path d="M316 462 C485 430 620 505 720 465" class="line"/>
  <path d="M316 566 C360 530 395 490 430 465" class="line"/>

  <path d="M670 215 L720 215" class="line"/>
  <path d="M550 255 L550 300" class="line"/>
  <path d="M840 255 L840 300" class="dash"/>
  <path d="M550 380 L550 425" class="dash"/>

  <path d="M670 340 C830 275 950 225 1075 228" class="line"/>
  <path d="M960 340 C1010 355 1040 380 1075 398" class="line"/>
  <path d="M1200 530 C1085 495 965 435 840 380" class="dash"/>

  <text x="335" y="205" class="tiny">record</text>
  <text x="334" y="497" class="tiny">routes</text>
  <text x="690" y="203" text-anchor="middle" class="tiny">schema</text>
  <text x="1000" y="218" class="tiny">scrape mesh_*</text>
  <text x="990" y="392" class="tiny">aggregate</text>
  <text x="1010" y="515" class="tiny">scrape /metrics</text>

</svg>
